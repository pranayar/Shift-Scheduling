<!DOCTYPE html>
<html>
<head>
<title>Shift Scheduler</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:#0f172a;
color:white;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:#1e293b;
padding:40px;
border-radius:14px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
text-align:center;
}

h1{margin:0 0 20px;font-size:26px}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:16px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{background:#2563eb}

a{
display:block;
margin-top:14px;
color:#60a5fa;
text-decoration:none;
font-size:14px;
}

.small{font-size:13px;color:#94a3b8}
table{
width:100%;
margin-top:20px;
border-collapse:collapse;
font-size:14px;
}

th,td{
padding:10px;
text-align:left;
}

tr{
border-bottom:1px solid #334155;
}

select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

.danger{
background:#ef4444;
}

.danger:hover{
background:#dc2626;
}
</style>

</head>

<body>

<div class="card">

{% block content %}{% endblock %}

</div>

</body>
</html>
