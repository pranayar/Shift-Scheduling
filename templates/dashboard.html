{% extends "base.html" %}
{% block content %}

<h1>Users</h1>

<table>

<tr>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th></th>
</tr>

{% for u in users %}

<tr>

<td>{{ u.name }}</td>

<td>{{ u.email }}</td>

<td>{{ u.department or "-" }}</td>

<td>
<a href="/delete_user/{{ u.uid }}">
<button class="danger">Delete</button>
</a>
</td>

</tr>

{% endfor %}

</table>

<h3>Add User</h3>

<form method="POST" action="/add_user">

<input name="name" placeholder="Name">

<input name="email" placeholder="Email">

<select name="did">

{% for d in depts %}

<option value="{{ d.did }}">

{{ d.name }}

</option>

{% endfor %}

</select>

<button>Add</button>

</form>

<a href="/logout">
Logout
</a>

{% endblock %}
